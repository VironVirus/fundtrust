<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundtrust | Management Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="no-print">
        <h1>Fundtrust</h1>
        <div class="tabs">
            <button onclick="showPage('deposit')">New Deposit</button>
            <button onclick="showPage('agents')">Agent Portal</button>
            <button onclick="showPage('admin')">Admin Dashboard</button>
        </div>
    </nav>

    <div id="depositPage" class="container page">
        <h2>Record Daily Contribution</h2>
        <form id="depositForm">
            <input type="text" id="agentName" placeholder="Agent Name" required>
            <input type="email" id="custEmail" placeholder="Customer Email" required>
            <input type="number" id="amount" placeholder="Amount (₦)" required>
            <button type="submit">Process & Notify</button>
        </form>
    </div>

    <div id="adminPage" class="container page" style="display:none;">
        <div class="header-row">
            <h2>Transaction Logs</h2>
            <button onclick="window.print()" class="no-print">Print Report</button>
        </div>
        <table id="transTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Agent</th>
                    <th>Customer</th>
                    <th>Amount</th>
                    <th>Balance</th>
                </tr>
            </thead>
            <tbody id="transBody"></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
